name: Publish package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  powershell-gallery:
    name: Publish to PowerShell Gallery
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - run: Test-ModuleManifest ./Nvoip.psd1
      - run: |
          New-Item -ItemType Directory -Path ./Nvoip -Force | Out-Null
          Copy-Item ./Nvoip.psm1, ./Nvoip.psd1, ./README.md, ./LICENSE -Destination ./Nvoip
          Publish-Module -Path ./Nvoip -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery -Force
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
